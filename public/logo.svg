<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <style>
      @font-face {
        font-family: 'Google Sans';
        src: url('https://fonts.gstatic.com/s/productsans/v5/HYvgU2fE2nRJvZ5JFAumweKxcPTngZzQhB_q-B5GgT1I.woff2') format('woff2');
        font-weight: 900;
        font-style: normal;
      }
      .location-text { 
        font-family: 'Google Sans', sans-serif; 
        font-weight: 900; 
        font-size: 14px; 
        letter-spacing: 2.8px; /* эквивалент 0.2em */
        text-transform: uppercase;
        fill: #000000; 
      }
      .brand-text { 
        font-family: 'Google Sans', sans-serif; 
        font-weight: 900; 
        font-size: 86px; 
        letter-spacing: -3.4px; /* эквивалент -0.04em */
        text-transform: uppercase;
        fill: #000000; 
      }
    </style>
  </defs>
  
  <rect x="0" y="0" width="400" height="200" fill="#FFFFFF"/>
  
  <text x="0" y="20" class="location-text">KZ / АЛМАТЫ</text>
  
  <text x="0" y="105" class="brand-text">PRO</text>
  <text x="0" y="180" class="brand-text">ELECTRO</text>
</svg>